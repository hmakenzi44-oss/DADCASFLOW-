<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DADCAS BUSINESS</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body { font-family: sans-serif; background:#f4f7fa; margin:0; }
nav { position:fixed; bottom:0; left:0; right:0; height:70px; background:#fff; display:flex; border-top:1px solid #eee;}
.nav-btn { flex:1; text-align:center; font-size:11px; color:#888; }
.active-tab { color:#007aff; }
.stat-card { background:#fff; padding:15px; border-radius:12px; }
main { padding:15px; padding-bottom:90px; }
</style>
</head>

<body>

<header class="bg-white p-3 text-center font-bold border-b" id="page-title">HOME</header>

<main>

<!-- HOME -->
<section id="mod-home">
<div class="grid grid-cols-2 gap-2">
<div class="stat-card">
<p>Sales Today</p>
<p id="dash-sales">$0.00</p>
</div>
<div class="stat-card">
<p>Products</p>
<p id="dash-total-items">0</p>
</div>
</div>
</section>

<!-- SALES -->
<section id="mod-sales" class="hidden space-y-3">

<div>
<p class="font-bold text-sm">Products</p>
<div id="product-list" class="space-y-2"></div>
</div>

<div>
<p class="font-bold text-sm">Cart</p>
<div id="cart-list" class="space-y-2"></div>

<div class="flex justify-between mt-2 font-bold">
<span>Total:</span>
<span id="cart-total">$0.00</span>
</div>

<button onclick="checkout()" class="w-full bg-green-500 text-white p-2 rounded mt-2">
Checkout
</button>
</div>

</section>

<!-- STOCKS -->
<section id="mod-stocks" class="hidden space-y-3">

<div class="bg-white p-3 rounded space-y-2">
<input id="p-name" placeholder="Name" class="w-full border p-2">
<input id="p-price" type="number" placeholder="Price" class="w-full border p-2">
<input id="p-stock" type="number" placeholder="Stock" class="w-full border p-2">
<button onclick="addProduct()" class="w-full bg-blue-500 text-white p-2">Add Product</button>
</div>

<div id="stock-list" class="space-y-2"></div>

</section>

<!-- MORE -->
<section id="mod-more" class="hidden">
<div class="bg-white p-3 rounded">
<p class="font-bold mb-2">More Menu</p>
<p>Reports</p>
<p>Employees</p>
<p>Settings</p>
</div>
</section>

</main>

<nav>
<button onclick="switchTab('home')" class="nav-btn active-tab" id="tab-home">Home</button>
<button onclick="switchTab('sales')" class="nav-btn" id="tab-sales">Sales</button>
<button onclick="switchTab('stocks')" class="nav-btn" id="tab-stocks">Stocks</button>
<button onclick="switchTab('more')" class="nav-btn" id="tab-more">More</button>
</nav>

<script>

/* DATABASE */
const DB = {
products: JSON.parse(localStorage.getItem('products')) || [],
sales: JSON.parse(localStorage.getItem('sales')) || []
};

function saveDB(){
localStorage.setItem('products', JSON.stringify(DB.products));
localStorage.setItem('sales', JSON.stringify(DB.sales));
}

/* SEED */
if(DB.products.length===0){
DB.products = [
{id:1,name:"Tyre 18",price:25,stock:10},
{id:2,name:"Oil",price:10,stock:20}
];
saveDB();
}

/* CART */
let CART=[];

function addToCart(id){
const p = DB.products.find(p=>p.id===id);
if(!p || p.stock<=0) return alert("No stock");

let item = CART.find(i=>i.id===id);
if(item){ item.qty++; }
else{ CART.push({...p,qty:1}); }

renderCart();
}

function changeQty(id,d){
let item = CART.find(i=>i.id===id);
if(!item) return;

item.qty += d;
if(item.qty<=0){ CART=CART.filter(i=>i.id!==id); }

renderCart();
}

function getTotal(){
return CART.reduce((s,i)=>s+i.price*i.qty,0);
}

/* CHECKOUT */
function checkout(){
if(CART.length===0) return alert("Empty");

CART.forEach(i=>{
let p = DB.products.find(p=>p.id===i.id);
p.stock -= i.qty;
});

DB.sales.push({id:Date.now(),total:getTotal(),date:new Date().toISOString()});

CART=[];
saveDB();

renderCart();
renderProducts();
renderStockList();
updateDashboard();

alert("Done");
}

/* PRODUCTS */
function renderProducts(){
const el=document.getElementById("product-list");
if(!el) return;

el.innerHTML = DB.products.map(p=>`
<div class="bg-white p-2 flex justify-between">
<span>${p.name} ($${p.price}) [${p.stock}]</span>
<button onclick="addToCart(${p.id})">Add</button>
</div>
`).join('');
}

/* CART */
function renderCart(){
const el=document.getElementById("cart-list");
if(!el) return;

el.innerHTML = CART.map(i=>`
<div class="bg-gray-100 p-2 flex justify-between">
<span>${i.name} x${i.qty}</span>
<div>
<button onclick="changeQty(${i.id},-1)">-</button>
<button onclick="changeQty(${i.id},1)">+</button>
</div>
</div>
`).join('');

document.getElementById("cart-total").innerText="$"+getTotal().toFixed(2);
}

/* INVENTORY */
function addProduct(){
let name=document.getElementById("p-name").value.trim();
let price=parseFloat(document.getElementById("p-price").value);
let stock=parseInt(document.getElementById("p-stock").value) || 0;

if(!name) return alert("Invalid");

DB.products.push({id:Date.now(),name,price,stock});
saveDB();

renderStockList();
renderProducts();
updateDashboard();
}

function deleteProduct(id){
DB.products = DB.products.filter(p=>p.id!==id);
saveDB();
renderStockList();
renderProducts();
updateDashboard();
}

function updateProduct(id,field,val){
let p=DB.products.find(p=>p.id===id);
if(!p) return;

if(field==="price") p.price=parseFloat(val);
if(field==="stock") p.stock=parseInt(val)||0;

saveDB();
}

/* STOCK UI */
function renderStockList(){
const el=document.getElementById("stock-list");
if(!el) return;

el.innerHTML = DB.products.map(p=>`
<div class="bg-white p-2">
<div class="flex justify-between">
<b>${p.name}</b>
<button onclick="deleteProduct(${p.id})">X</button>
</div>
<div class="flex gap-2">
<input value="${p.price}" onchange="updateProduct(${p.id},'price',this.value)" class="border w-1/2">
<input value="${p.stock}" onchange="updateProduct(${p.id},'stock',this.value)" class="border w-1/2">
</div>
</div>
`).join('');
}

/* DASH */
function updateDashboard(){
document.getElementById("dash-total-items").innerText=DB.products.length;

let today=new Date().toISOString().slice(0,10);
let total=DB.sales.filter(s=>s.date.startsWith(today))
.reduce((s,i)=>s+i.total,0);

document.getElementById("dash-sales").innerText="$"+total.toFixed(2);
}

/* NAV */
function switchTab(t){
document.querySelectorAll("main section").forEach(s=>s.classList.add("hidden"));
document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active-tab"));

document.getElementById("mod-"+t).classList.remove("hidden");
document.getElementById("tab-"+t).classList.add("active-tab");

document.getElementById("page-title").innerText=t.toUpperCase();

if(t==="sales"){ renderProducts(); renderCart(); }
if(t==="stocks"){ renderStockList(); }
}

/* INIT */
window.onload=()=>{
renderProducts();
renderCart();
renderStockList();
updateDashboard();
}

</script>

</body>
</html>
