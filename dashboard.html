<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftPOS | Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .active-tab { color: #3b82f6; border-top: 2px solid #3b82f6; }
        body { padding-bottom: 70px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-10">
        <h1 id="page-title" class="text-xl font-bold text-blue-600 text-center">Dashboard</h1>
    </header>

    <main class="p-4">
        
        <section id="mod-home" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                    <p class="text-xs text-gray-500 uppercase">Today's Sales</p>
                    <p id="dash-sales" class="text-xl font-bold">$0.00</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500">
                    <p class="text-xs text-gray-500 uppercase">Today's Profit</p>
                    <p id="dash-profit" class="text-xl font-bold">$0.00</p>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <p class="text-xs text-gray-500 mb-2">Inventory Status</p>
                <p class="text-lg">Total Products: <span id="dash-total-items" class="font-bold">0</span></p>
            </div>
            <div id="low-stock-container" class="hidden">
                <p class="text-red-500 font-bold text-sm mb-2">⚠️ Low Stock Alerts</p>
                <div id="low-stock-list" class="space-y-2"></div>
            </div>
        </section>

        <section id="mod-sales" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <label class="block text-sm font-medium mb-1">Select Product</label>
                <select id="sale-product" class="w-full p-2 border rounded-lg mb-3"></select>
                
                <div class="flex gap-2 mb-3">
                    <div class="w-1/2">
                        <label class="block text-sm font-medium mb-1">Quantity</label>
                        <input type="number" id="sale-qty" value="1" min="1" class="w-full p-2 border rounded-lg">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm font-medium mb-1">Price</label>
                        <input type="text" id="sale-price" disabled class="w-full p-2 border rounded-lg bg-gray-100">
                    </div>
                </div>
                <button onclick="addToCart()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Add to Cart</button>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm">
                <h3 class="font-bold border-b pb-2 mb-2">Current Cart</h3>
                <div id="cart-list" class="divide-y text-sm"></div>
                <div class="mt-4 pt-2 border-t flex justify-between items-center">
                    <span class="font-bold">Total:</span>
                    <span id="cart-total" class="text-xl font-bold text-blue-600">$0.00</span>
                </div>
                <button onclick="completeSale()" id="checkout-btn" class="w-full mt-4 bg-green-600 text-white py-3 rounded-lg font-bold hidden">Complete Sale</button>
            </div>
        </section>

        <section id="mod-stocks" class="hidden space-y-4">
            <button onclick="toggleProductForm()" class="w-full bg-blue-600 text-white py-2 rounded-lg">+ Add New Product</button>
            
            <div id="product-form" class="hidden bg-white p-4 rounded-xl shadow-inner border border-blue-100">
                <input type="text" id="p-name" placeholder="Product Name" class="w-full p-2 border rounded mb-2">
                <div class="flex gap-2 mb-2">
                    <input type="number" id="p-buy" placeholder="Buy Price" class="w-1/2 p-2 border rounded">
                    <input type="number" id="p-sell" placeholder="Sell Price" class="w-1/2 p-2 border rounded">
                </div>
                <input type="number" id="p-qty" placeholder="Initial Stock" class="w-full p-2 border rounded mb-2">
                <button onclick="saveProduct()" class="w-full bg-green-500 text-white py-2 rounded">Save Product</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-100 uppercase text-xs">
                        <tr>
                            <th class="p-3">Item</th>
                            <th class="p-3">Stock</th>
                            <th class="p-3">Price</th>
                        </tr>
                    </thead>
                    <tbody id="stock-table-body" class="divide-y"></tbody>
                </table>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around items-center h-16 text-gray-400">
        <button onclick="switchTab('home')" id="tab-home" class="flex flex-col items-center active-tab">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px]">Home</span>
        </button>
        <button onclick="switchTab('sales')" id="tab-sales" class="flex flex-col items-center">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span class="text-[10px]">Sales</span>
        </button>
        <button onclick="switchTab('stocks')" id="tab-stocks" class="flex flex-col items-center">
            <i class="fas fa-box text-xl"></i>
            <span class="text-[10px]">Stocks</span>
        </button>
    </nav>

    <script>
        // Data Initialization
        let products = JSON.parse(localStorage.getItem('pos_products')) || [];
        let sales = JSON.parse(localStorage.getItem('pos_sales')) || [];
        let cart = [];

        // UI Switching
        function switchTab(tab) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            
            document.getElementById(`mod-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            document.getElementById('page-title').innerText = tab.charAt(0).toUpperCase() + tab.slice(1);
            
            if(tab === 'home') updateDashboard();
            if(tab === 'stocks') renderStocks();
            if(tab === 'sales') prepareSales();
        }

        // Logic: Stocks
        function toggleProductForm() {
            const form = document.getElementById('product-form');
            form.classList.toggle('hidden');
        }

        function saveProduct() {
            const product = {
                id: Date.now(),
                name: document.getElementById('p-name').value,
                buy_price: parseFloat(document.getElementById('p-buy').value),
                sell_price: parseFloat(document.getElementById('p-sell').value),
                quantity: parseInt(document.getElementById('p-qty').value),
                created_at: new Date().toISOString()
            };
            products.push(product);
            localStorage.setItem('pos_products', JSON.stringify(products));
            renderStocks();
            toggleProductForm();
        }

        function renderStocks() {
            const tbody = document.getElementById('stock-table-body');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td class="p-3 font-medium">${p.name}</td>
                    <td class="p-3 ${p.quantity < 5 ? 'text-red-500 font-bold' : ''}">${p.quantity}</td>
                    <td class="p-3">$${p.sell_price.toFixed(2)}</td>
                </tr>
            `).join('');
        }

        // Logic: Sales
        function prepareSales() {
            const select = document.getElementById('sale-product');
            select.innerHTML = '<option value="">Select Product...</option>' + 
                products.map(p => `<option value="${p.id}">${p.name} (${p.quantity} left)</option>`).join('');
            
            select.onchange = (e) => {
                const prod = products.find(p => p.id == e.target.value);
                document.getElementById('sale-price').value = prod ? `$${prod.sell_price}` : '';
            };
        }

        function addToCart() {
            const prodId = document.getElementById('sale-product').value;
            const qty = parseInt(document.getElementById('sale-qty').value);
            const product = products.find(p => p.id == prodId);

            if(!product || qty > product.quantity) return alert("Invalid quantity or product!");

            cart.push({ ...product, cartQty: qty, total: qty * product.sell_price });
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const totalDisplay = document.getElementById('cart-total');
            let total = 0;

            list.innerHTML = cart.map(item => {
                total += item.total;
                return `<div class="py-2 flex justify-between">
                    <span>${item.name} x ${item.cartQty}</span>
                    <span class="font-bold">$${item.total.toFixed(2)}</span>
                </div>`;
            }).join('');

            totalDisplay.innerText = `$${total.toFixed(2)}`;
            document.getElementById('checkout-btn').classList.toggle('hidden', cart.length === 0);
        }

        function completeSale() {
            const today = new Date().toLocaleDateString();
            
            cart.forEach(item => {
                const profit = (item.sell_price - item.buy_price) * item.cartQty;
                
                // Add to Sales Ledger
                sales.push({
                    id: Date.now(),
                    product_id: item.id,
                    product_name: item.name,
                    quantity: item.cartQty,
                    sell_price: item.sell_price,
                    buy_price: item.buy_price,
                    total: item.total,
                    profit: profit,
                    date: today
                });

                // Update Stock
                const prodIndex = products.findIndex(p => p.id === item.id);
                products[prodIndex].quantity -= item.cartQty;
            });

            localStorage.setItem('pos_sales', JSON.stringify(sales));
            localStorage.setItem('pos_products', JSON.stringify(products));
            
            cart = [];
            renderCart();
            alert("Sale Completed!");
            switchTab('home');
        }

        // Logic: Dashboard
        function updateDashboard() {
            const today = new Date().toLocaleDateString();
            const todaySales = sales.filter(s => s.date === today);
            
            const totalSales = todaySales.reduce((sum, s) => sum + s.total, 0);
            const totalProfit = todaySales.reduce((sum, s) => sum + s.profit, 0);
            const lowStock = products.filter(p => p.quantity < 5);

            document.getElementById('dash-sales').innerText = `$${totalSales.toFixed(2)}`;
            document.getElementById('dash-profit').innerText = `$${totalProfit.toFixed(2)}`;
            document.getElementById('dash-total-items').innerText = products.length;

            const lowStockContainer = document.getElementById('low-stock-container');
            const lowStockList = document.getElementById('low-stock-list');
            
            if(lowStock.length > 0) {
                lowStockContainer.classList.remove('hidden');
                lowStockList.innerHTML = lowStock.map(p => `
                    <div class="bg-red-50 p-2 rounded text-red-700 text-sm flex justify-between">
                        <span>${p.name}</span>
                        <span class="font-bold">${p.quantity} left</span>
                    </div>
                `).join('');
            } else {
                lowStockContainer.classList.add('hidden');
            }
        }

        // Initialize
        updateDashboard();
    </script>
</body>
</html>
